name: caloriestarcker
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  weekly_streak:
    git:
      url: https://github.com/YousefMohamed021/Custom_Flutter_Component-weekly_streak_bubbles.git
      path: weekly_streak

  # Firebase
  firebase_core: ^4.7.0
  cloud_firestore: ^6.3.0
  firebase_storage: ^13.0.0
  firebase_auth: ^6.4.0

  # UI & State Management
  percent_indicator: ^4.2.5
  provider: ^6.1.2

  # Plugins & Native Features
  image_picker: ^1.1.0 # Camera
  simple_barcode_scanner: ^0.6.0

  # Local Storage
  shared_preferences: ^2.2.3

  # Network
  http: ^1.2.0

  # Utilities
  intl: ^0.19.0 # Date formatting
  uuid: ^4.4.0
  flutter_local_notifications: ^21.0.0
  pdf: ^3.12.0
  printing: ^5.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png

  fonts:
    - family: Archivo
      fonts:
        - asset: assets/fonts/Archivo/Archivo-VariableFont_wdth,wght.ttf
